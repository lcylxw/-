<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>心跳4k剧场 - WebHome</title>
<style>
/* ============================================================
   基础重置 & 透明背景
   App 环境下保持页面级透明，壁纸可透出
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:transparent;-webkit-tap-highlight-color:transparent}
html:not(.fm-native),html:not(.fm-native) body{background:#12151a}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:#e8eaed;line-height:1.5;overflow-x:hidden}

/* ============================================================
   CSS 变量 — 半透明面板色
   ============================================================ */
:root{
  --panel-rgb:28,32,40;
  --panel:rgba(var(--panel-rgb),.68);
  --panel-soft:rgba(var(--panel-rgb),.48);
  --panel-strong:rgba(var(--panel-rgb),.88);
  --line:rgba(255,255,255,.12);
  --accent:#e53935;
  --accent-glow:rgba(229,57,53,.35);
  --accent2:#ff7043;
  --text:#e8eaed;
  --text-dim:rgba(255,255,255,.5);
  --text-bright:#fff;
  --radius:10px;
  --safe-top:env(safe-area-inset-top,0);
  --safe-bottom:env(safe-area-inset-bottom,0)
}

/* ============================================================
   布局
   ============================================================ */
.app{min-height:100vh;padding:var(--safe-top) 0 calc(56px + var(--safe-bottom)) 0;background:transparent}

/* 顶部栏 */
.topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--panel-strong);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
.topbar-logo{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;letter-spacing:.5px}
.search-box{flex:1;display:flex;align-items:center;gap:6px;padding:7px 12px;background:var(--panel-soft);border:1px solid var(--line);border-radius:18px;transition:border-color .2s}
.search-box:focus-within{border-color:var(--accent)}
.search-box input{flex:1;border:none;outline:none;background:transparent;color:var(--text);font-size:13px}
.search-box input::placeholder{color:var(--text-dim)}
.search-btn{padding:4px 12px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}

/* 分类 Tab */
.tabs{display:flex;gap:0;padding:0 14px;background:var(--panel);border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;font-size:13px;color:var(--text-dim);white-space:nowrap;cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* 内容区 */
.content{padding:14px}

/* 热搜标签 */
.hot-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.hot-tag{padding:5px 12px;font-size:12px;background:var(--panel-soft);border:1px solid var(--line);border-radius:14px;color:var(--text);cursor:pointer;transition:background .15s}
.hot-tag:active{background:var(--accent-glow);border-color:var(--accent)}

/* 网盘图标网格 */
.pan-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:16px}
.pan-card{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;background:var(--panel-soft);border:1px solid var(--line);border-radius:var(--radius);cursor:pointer;transition:transform .15s,background .15s}
.pan-card:active{transform:scale(.95);background:var(--accent-glow)}
.pan-icon{width:36px;height:36px;border-radius:8px;object-fit:contain;background:var(--panel)}
.pan-name{font-size:12px;font-weight:600;color:var(--text)}
.pan-count{font-size:11px;color:var(--text-dim)}

/* 卡片网格 */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
.card{position:relative;border-radius:var(--radius);overflow:hidden;background:var(--panel-soft);border:1px solid var(--line);transition:transform .15s}
.card:active{transform:scale(.97)}
.card-poster{width:100%;aspect-ratio:2/3;object-fit:cover;display:block;background:var(--panel)}
.card-info{padding:7px 9px}
.card-title{font-size:12px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-remarks{font-size:11px;color:var(--text-dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 搜索结果列表 */
.result-list{display:flex;flex-direction:column;gap:8px}
.result-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--panel-soft);border:1px solid var(--line);border-radius:var(--radius);cursor:pointer;transition:transform .15s}
.result-item:active{transform:scale(.98)}
.result-icon{width:32px;height:32px;border-radius:6px;object-fit:contain;flex-shrink:0;background:var(--panel)}
.result-info{flex:1;min-width:0}
.result-title{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.result-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.result-badge{padding:3px 8px;font-size:11px;border-radius:10px;font-weight:600;flex-shrink:0}
.badge-direct{background:rgba(76,175,80,.2);color:#66bb6a;border:1px solid rgba(76,175,80,.3)}
.badge-push{background:rgba(255,152,0,.2);color:#ffa726;border:1px solid rgba(255,152,0,.3)}

/* 状态面板 */
.status-panel{margin-top:16px;padding:14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius)}
.status-panel h3{font-size:14px;color:var(--accent);margin-bottom:8px}
.status-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px;border-bottom:1px solid var(--line)}
.status-row:last-child{border-bottom:none}
.status-label{color:var(--text-dim)}
.status-value{color:var(--text);text-align:right;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* 空状态 */
.empty{text-align:center;padding:50px 20px;color:var(--text-dim);font-size:13px}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.4}

/* 加载 */
.loading{text-align:center;padding:30px;color:var(--text-dim);font-size:13px}
.loading::after{content:"";display:inline-block;width:14px;height:14px;border:2px solid var(--text-dim);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* 底部导航 */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:150;display:flex;background:var(--panel-strong);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:6px 0 calc(6px + var(--safe-bottom))}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 0;cursor:pointer;color:var(--text-dim);font-size:10px;transition:color .2s}
.nav-item.active{color:var(--accent)}
.nav-icon{font-size:18px}

/* 搜索历史 */
.history-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.history-tag{display:flex;align-items:center;gap:4px;padding:4px 10px;font-size:11px;background:var(--panel-soft);border:1px solid var(--line);border-radius:12px;color:var(--text-dim);cursor:pointer}
.history-tag:active{color:var(--accent);border-color:var(--accent)}
.history-clear{font-size:11px;color:var(--text-dim);cursor:pointer;padding:4px 10px}
.history-clear:active{color:var(--accent)}

/* 分隔标题 */
.section-title{display:flex;align-items:center;gap:8px;margin:16px 0 10px;font-size:14px;font-weight:700;color:var(--text)}
.section-title::before{content:"";width:3px;height:14px;background:var(--accent);border-radius:2px}
</style>
</head>
<body>
<div class="app" id="app">
  <!-- 顶部栏 -->
  <div class="topbar">
    <div class="topbar-logo">心跳4K</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索网盘资源...">
      <button class="search-btn" id="searchBtn">搜索</button>
    </div>
  </div>

  <!-- 分类 Tab -->
  <div class="tabs" id="tabs">
    <div class="tab active" data-tid="hot">热门</div>
    <div class="tab" data-tid="1">电视剧</div>
    <div class="tab" data-tid="2">电影</div>
    <div class="tab" data-tid="3">综艺</div>
    <div class="tab" data-tid="4">动漫</div>
  </div>

  <!-- 内容区 -->
  <div class="content" id="mainContent">
    <!-- 搜索历史 -->
    <div id="searchHistoryWrap" style="display:none">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <div class="section-title" style="margin:0">搜索历史</div>
        <div class="history-clear" id="clearHistory">清空</div>
      </div>
      <div class="history-tags" id="historyTags"></div>
    </div>

    <!-- 热搜推荐 -->
    <div class="section-title">热搜推荐</div>
    <div class="hot-tags" id="hotTags"></div>

    <!-- 网盘快捷入口 -->
    <div class="section-title">网盘分类</div>
    <div class="pan-grid" id="panGrid"></div>

    <!-- 内容列表 -->
    <div id="contentArea"></div>
  </div>
</div>

<!-- 底部导航 -->
<div class="bottom-nav">
  <div class="nav-item active" data-nav="home"><span class="nav-icon">🏠</span>首页</div>
  <div class="nav-item" data-nav="keep"><span class="nav-icon">⭐</span>收藏</div>
  <div class="nav-item" data-nav="live"><span class="nav-icon">📺</span>直播</div>
  <div class="nav-item" data-nav="history"><span class="nav-icon">🕐</span>历史</div>
  <div class="nav-item" data-nav="device"><span class="nav-icon">📱</span>设备</div>
</div>

<script>
(function() {
  "use strict";

  // ============================================================
  // 环境检测
  // ============================================================
  var isNative = !!(window.fongmiBridge || window.fm || window.fongmi);
  if (isNative) {
    document.documentElement.classList.add("fm-native");
  }

  // ============================================================
  // SDK 等待
  // ============================================================
  function waitForSDK(timeout) {
    timeout = timeout || 6000;
    return new Promise(function(resolve, reject) {
      if (window.fm) return resolve(window.fm);
      var timer = setTimeout(function() { reject(new Error("SDK 超时")); }, timeout);
      function check() {
        if (window.fm) { clearTimeout(timer); resolve(window.fm); }
        else { requestAnimationFrame(check); }
      }
      check();
    });
  }

  // ============================================================
  // 状态
  // ============================================================
  var sdk = null;
  var currentTab = "hot";

  // 热搜关键词
  var HOT_KEYWORDS = [
    "庆余年2", "狂飙", "繁花", "三体", "长相思",
    "与凤行", "墨雨云间", "玫瑰的故事", "度华年", "长相思2",
    "我的阿勒泰", "去有风的地方", "漫长的季节", "莲花楼"
  ];

  // 网盘配置（与 Spider 保持一致）
  var PAN_LIST = [
    { key: "quark", name: "夸克", icon: "https://ppan.dyuzi.com/views/index/template/btlm/disk-icons/quark.webp" },
    { key: "uc", name: "UC", icon: "https://ppan.dyuzi.com/views/index/template/btlm/disk-icons/uc.webp" },
    { key: "aliyun", name: "阿里", icon: "https://ppan.dyuzi.com/views/index/template/btlm/disk-icons/aliyun.webp" },
    { key: "baidu", name: "百度", icon: "https://ppan.dyuzi.com/views/index/template/btlm/disk-icons/baidu.webp" },
    { key: "xunlei", name: "迅雷", icon: "https://ppan.dyuzi.com/views/index/template/btlm/disk-icons/xunlei.webp" },
    { key: "a189", name: "天翼", icon: "https://ppan.dyuzi.com/views/index/template/btlm/disk-icons/189.webp" }
  ];

  // ============================================================
  // DOM
  // ============================================================
  var $tabs = document.getElementById("tabs");
  var $contentArea = document.getElementById("contentArea");
  var $searchInput = document.getElementById("searchInput");
  var $searchBtn = document.getElementById("searchBtn");
  var $hotTags = document.getElementById("hotTags");
  var $panGrid = document.getElementById("panGrid");
  var $historyWrap = document.getElementById("searchHistoryWrap");
  var $historyTags = document.getElementById("historyTags");
  var $clearHistory = document.getElementById("clearHistory");

  // ============================================================
  // 初始化
  // ============================================================
  async function init() {
    try { sdk = await waitForSDK(); } catch (e) { sdk = null; }
    renderHotTags();
    renderPanGrid();
    loadSearchHistory();
    loadTabContent(currentTab);

    window.addEventListener("fmsdk", function() { sdk = window.fm; });
    window.addEventListener("fmresume", function(e) {
      console.log("fmresume, paused:", e.detail.pausedMs, "ms");
    });
  }

  // ============================================================
  // 热搜标签
  // ============================================================
  function renderHotTags() {
    $hotTags.innerHTML = HOT_KEYWORDS.map(function(kw) {
      return '<div class="hot-tag" data-kw="' + esc(kw) + '">' + esc(kw) + '</div>';
    }).join("");
    $hotTags.addEventListener("click", function(e) {
      var tag = e.target.closest(".hot-tag");
      if (tag) doSearch(tag.dataset.kw);
    });
  }

  // ============================================================
  // 网盘快捷入口
  // ============================================================
  function renderPanGrid() {
    $panGrid.innerHTML = PAN_LIST.map(function(p) {
      var imgSrc = sdk ? sdk.res(p.icon) : p.icon;
      return '<div class="pan-card" data-pan="' + p.key + '">' +
        '<img class="pan-icon" src="' + escA(imgSrc) + '" onerror="this.style.display=\'none\'">' +
        '<div class="pan-name">' + esc(p.name) + '</div></div>';
    }).join("");
    $panGrid.addEventListener("click", function(e) {
      var card = e.target.closest(".pan-card");
      if (card) {
        var pan = card.dataset.pan;
        // 点击网盘分类 → 搜索当前输入或热搜第一词
        var kw = $searchInput.value.trim() || HOT_KEYWORDS[0];
        doSearch(kw);
      }
    });
  }

  // ============================================================
  // Tab 切换
  // ============================================================
  $tabs.addEventListener("click", function(e) {
    var tab = e.target.closest(".tab");
    if (!tab) return;
    currentTab = tab.dataset.tid;
    $tabs.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
    tab.classList.add("active");
    loadTabContent(currentTab);
  });

  function loadTabContent(tid) {
    $contentArea.innerHTML = "";
    if (tid === "hot") {
      // 热门：显示热搜和网盘分类（已由静态 HTML 渲染）
      return;
    }
    // 分类 Tab：通过 SDK 搜索进入原生界面
    var channelMap = { "1": "电视剧", "2": "电影", "3": "综艺", "4": "动漫" };
    var channel = channelMap[tid] || "";
    if (sdk && channel) {
      // 通过 fm.search 搜索频道热门词，进入原生搜索结果
      sdk.search(channel, { direct: true }).catch(function() {});
    } else {
      $contentArea.innerHTML = '<div class="empty"><div class="empty-icon">📺</div>请在 App 中查看分类内容</div>';
    }
  }

  // ============================================================
  // 搜索
  // ============================================================
  function doSearch(keyword) {
    if (!keyword || !keyword.trim()) return;
    keyword = keyword.trim();
    $searchInput.value = keyword;
    saveSearchHistory(keyword);

    if (sdk) {
      // 使用 SDK 搜索，direct:true 直接进入搜索结果列表
      sdk.search(keyword, { direct: true }).catch(function(e) {
        console.error("搜索失败:", e);
      });
    } else {
      $contentArea.innerHTML = '<div class="empty"><div class="empty-icon">🔍</div>请在 App 中使用搜索功能<br><span style="font-size:11px;margin-top:6px;display:block">关键词: ' + esc(keyword) + '</span></div>';
    }
  }

  $searchBtn.addEventListener("click", function() { doSearch($searchInput.value); });
  $searchInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") doSearch($searchInput.value);
  });

  // ============================================================
  // 搜索历史（本地缓存）
  // ============================================================
  var HISTORY_KEY = "webhome_search_history";
  var MAX_HISTORY = 15;

  function getSearchHistory() {
    try {
      var data = localStorage.getItem(HISTORY_KEY);
      return data ? JSON.parse(data) : [];
    } catch (e) { return []; }
  }

  function saveSearchHistory(keyword) {
    var list = getSearchHistory();
    list = list.filter(function(k) { return k !== keyword; });
    list.unshift(keyword);
    if (list.length > MAX_HISTORY) list = list.slice(0, MAX_HISTORY);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
    loadSearchHistory();
  }

  function loadSearchHistory() {
    var list = getSearchHistory();
    if (list.length === 0) {
      $historyWrap.style.display = "none";
      return;
    }
    $historyWrap.style.display = "";
    $historyTags.innerHTML = list.map(function(k) {
      return '<div class="history-tag" data-kw="' + esc(k) + '">' + esc(k) + '</div>';
    }).join("");
  }

  $historyTags.addEventListener("click", function(e) {
    var tag = e.target.closest(".history-tag");
    if (tag) doSearch(tag.dataset.kw);
  });

  $clearHistory.addEventListener("click", function() {
    localStorage.removeItem(HISTORY_KEY);
    loadSearchHistory();
  });

  // ============================================================
  // 底部导航
  // ============================================================
  document.querySelectorAll(".nav-item").forEach(function(item) {
    item.addEventListener("click", function() {
      var nav = item.dataset.nav;
      document.querySelectorAll(".nav-item").forEach(function(n) { n.classList.remove("active"); });
      item.classList.add("active");
      if (!sdk) return;

      switch (nav) {
        case "home":
          currentTab = "hot";
          $tabs.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
          $tabs.querySelector('[data-tid="hot"]').classList.add("active");
          $contentArea.innerHTML = "";
          $historyWrap.style.display = "";
          break;
        case "keep":
          sdk.openKeep().catch(function() {});
          break;
        case "live":
          sdk.openLive().catch(function() {});
          break;
        case "history":
          showViewHistory();
          break;
        case "device":
          showDeviceInfo();
          break;
      }
    });
  });

  // ============================================================
  // 最近观看
  // ============================================================
  async function showViewHistory() {
    if (!sdk) return;
    try {
      var history = await sdk.history();
      if (history && history.length > 0) {
        var html = '<div class="section-title">最近观看</div><div class="result-list">';
        history.forEach(function(h) {
          var pic = h.vodPic ? sdk.res(h.vodPic) : "";
          var pos = h.position ? Math.floor(h.position / 60000) : 0;
          var dur = h.duration ? Math.floor(h.duration / 60000) : 0;
          var progress = dur > 0 ? Math.min(100, Math.round(pos / dur * 100)) : 0;
          html += '<div class="result-item" data-name="' + escA(h.vodName || '') + '">' +
            (pic ? '<img class="result-icon" src="' + escA(pic) + '" onerror="this.style.display=\'none\'">' :
              '<div class="result-icon" style="display:flex;align-items:center;justify-content:center;font-size:16px">🎬</div>') +
            '<div class="result-info"><div class="result-title">' + esc(h.vodName || "未知") + '</div>' +
            '<div class="result-meta">看到 ' + pos + '/' + dur + ' 分钟 (' + progress + '%)</div></div></div>';
        });
        html += '</div>';
        $contentArea.innerHTML = html;

        // 点击继续播放
        $contentArea.querySelectorAll(".result-item").forEach(function(item) {
          item.addEventListener("click", function() {
            var name = item.dataset.name;
            if (name) sdk.search(name, { direct: true }).catch(function() {});
          });
        });
      } else {
        $contentArea.innerHTML = '<div class="empty"><div class="empty-icon">🕐</div>暂无观看记录</div>';
      }
    } catch (e) {
      console.error("获取历史失败:", e);
      $contentArea.innerHTML = '<div class="empty"><div class="empty-icon">🕐</div>获取历史失败</div>';
    }
  }

  // ============================================================
  // 设备信息
  // ============================================================
  async function showDeviceInfo() {
    if (!sdk) return;
    try {
      var device = await sdk.device();
      var typeMap = { 0: "电视端", 1: "手机端", 2: "DLNA 设备" };
      $contentArea.innerHTML =
        '<div class="status-panel">' +
        '<h3>设备信息</h3>' +
        '<div class="status-row"><span class="status-label">设备名</span><span class="status-value">' + esc(device.name || "未知") + '</span></div>' +
        '<div class="status-row"><span class="status-label">地址</span><span class="status-value">' + esc(device.ip || "") + '</span></div>' +
        '<div class="status-row"><span class="status-label">类型</span><span class="status-value">' + (typeMap[device.type] || "其他") + '</span></div>' +
        '<div class="status-row"><span class="status-label">UUID</span><span class="status-value" style="font-size:10px">' + esc(device.uuid || "") + '</span></div>' +
        '</div>';
    } catch (e) {
      console.error("获取设备信息失败:", e);
    }
  }

  // ============================================================
  // 工具函数
  // ============================================================
  function esc(s) {
    var d = document.createElement("div");
    d.textContent = s || "";
    return d.innerHTML;
  }
  function escA(s) {
    return (s || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/'/g, "&#39;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  // 启动
  init();
})();
</script>
